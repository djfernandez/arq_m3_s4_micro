name: microservices-db-dev
services:
  # PostgreSQL para User Service
  postgres-userdb-dev:
    image: postgres:15-alpine
    container_name: postgres-userdb-dev
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5433:5432" # Puerto externo 5433, interno 5432
    volumes:
      - postgres-userdb-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d userdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # PostgreSQL para Course Service
  postgres-coursedb-dev:
    image: postgres:15-alpine
    container_name: postgres-coursedb-dev
