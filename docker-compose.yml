name: microservices-db-kafka-dev
services:
  # PostgreSQL para User Service
  postgres-userdb-dev:
    image: postgres:15-alpine
    container_name: postgres-userdb-dev
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5433:5432" # Puerto externo 5433, interno 5432
    volumes:
      - postgres-userdb-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d userdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # PostgreSQL para Course Service
  postgres-coursedb-dev:
    image: postgres:15-alpine
    container_name: postgres-coursedb-dev
    environment:
      POSTGRES_DB: coursedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5434:5432" # Puerto externo 5434, interno 5432
    volumes:
      - postgres-coursedb-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d coursedb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # PostgreSQL para Enrollment Service
  postgres-enrollmentdb-dev:
    image: postgres:15-alpine
    container_name: postgres-enrollmentdb-dev
    environment:
      POSTGRES_DB: enrollmentdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5435:5432" # Puerto externo 5435, interno 5432
    volumes:
      - postgres-enrollmentdb-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d enrollmentdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-paymentdb-dev:
    image: postgres:15-alpine
    container_name: postgres-paymentdb-dev
    environment:
      POSTGRES_DB: paymentdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5436:5432" # Puerto externo 5436, interno 5432
    volumes:
      - postgres-paymentdb-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d paymentdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-notificationdb-dev:
    image: postgres:15-alpine
    container_name: postgres-notificationdb-dev
    environment:
      POSTGRES_DB: notificationdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5437:5432" # Puerto externo 5437, interno 5432
    volumes:
      - postgres-notificationdb-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notificationdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper-dev
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-dev
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper-dev:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-dev:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui-dev
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-dev:29092

  # pgAdmin (Opcional - para visualizar DBs)
  #pgadmin:
  #  image: dpage/pgadmin4:latest
  #  container_name: pgadmin
  #  environment:
  #    PGADMIN_DEFAULT_EMAIL: admin@admin.com
  #    PGADMIN_DEFAULT_PASSWORD: admin
  #    PGADMIN_CONFIG_SERVER_MODE: 'False'
  #  ports:
  #    - "5050:80"
  #  volumes:
  #    - pgadmin-data:/var/lib/pgadmin
  #  depends_on:
  #    - postgres-userdb-dev
  #    - postgres-coursedb-dev
  #  restart: unless-stopped

volumes:
  postgres-userdb-dev-data:
    driver: local
  postgres-coursedb-dev-data:
    driver: local
  postgres-enrollmentdb-dev-data:
    driver: local
  postgres-paymentdb-dev-data:
    driver: local
  postgres-notificationdb-dev-data:
    driver: local
  zookeeper-data:
    driver: local
  zookeeper-logs:
    driver: local
  kafka-data:
    driver: local
  #pgadmin-data:
  #  driver: local
